<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; img-src data:; base-uri 'none'; form-action 'none'; frame-ancestors 'none'">
<meta name="robots" content="noindex, nofollow">
<meta name="description" content="陶と土 — 小さな陶芸の工房。">
<title>陶と土 — 陶芸工房</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Hiragino Kaku Gothic ProN","Yu Gothic","Segoe UI",sans-serif;color:#3b352e;background:#efe9e0;line-height:1.95}
  a{text-decoration:none;color:inherit}
  .wrap{max-width:880px;margin:0 auto;padding:0 30px}
  header{display:flex;justify-content:space-between;align-items:center;padding:30px 0}
  .logo{font-size:22px;letter-spacing:.3em}
  nav a{margin-left:24px;font-size:14px;color:#8a8072;letter-spacing:.1em}
  .hero{padding:80px 0 60px}
  .hero .vt{writing-mode:vertical-rl;height:240px;font-size:40px;letter-spacing:.3em;margin:0 auto;font-weight:500}
  .hero p{text-align:center;color:#8a8072;margin-top:30px;font-size:16px;letter-spacing:.08em}
  .pieces{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;padding:30px 0 70px}
  .piece{background:#e3d9c9;aspect-ratio:1;border-radius:50% 50% 48% 52%/55% 55% 45% 45%;display:flex;align-items:flex-end;justify-content:center;padding-bottom:18px;color:#6f6555;font-size:13px;letter-spacing:.1em}
  .p1{background:#dfd3bf}.p2{background:#d6c9b4}.p3{background:#e6dccb}.p4{background:#d2c4ac}.p5{background:#e0d6c2}.p6{background:#d8cab2}
  @media(max-width:620px){.pieces{grid-template-columns:1fr 1fr}.hero .vt{font-size:30px;height:200px}}
  .text{background:#3b352e;color:#e4dccd;padding:70px 30px;text-align:center}
  .text p{font-size:17px;letter-spacing:.12em;max-width:560px;margin:0 auto;line-height:2.2}
  footer{padding:40px 0;text-align:center;color:#8a8072;font-size:13px;letter-spacing:.12em}
</style>
</head>
<body>
<header><div class="wrap" style="display:flex;justify-content:space-between;align-items:center;width:100%">
  <div class="logo">陶と土</div>
  <nav><a href="#sakuhin">作品</a><a href="#kobo">工房</a><a href="#access">アクセス</a></nav>
</div></header>

<section class="wrap hero">
  <div class="vt">土から、<br>くらしの器を。</div>
  <p>ひとつずつ手で挽き、薪の窯で焼いた、日々のための器です。</p>
</section>

<section class="wrap" id="sakuhin">
  <div class="pieces">
    <div class="piece p1">飯碗</div>
    <div class="piece p2">湯のみ</div>
    <div class="piece p3">小皿</div>
    <div class="piece p4">片口</div>
    <div class="piece p5">花入</div>
    <div class="piece p6">急須</div>
  </div>
</section>

<section class="text" id="kobo">
  <p>不揃いであること。<br>手のあとが残ること。<br>それを景色として、長く使える器を目指しています。</p>
</section>

<footer id="access">&copy; 2026 陶と土 &middot; 山あいの古い納屋にて &middot; 火曜定休</footer>
</body>
</html>

<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; img-src data:; base-uri 'none'; form-action 'none'; frame-ancestors 'none'">
<meta name="robots" content="noindex, nofollow">
<meta name="description" content="青山茶舍 — 安静的茶空间。">
<title>青山茶舍</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Microsoft YaHei","PingFang SC","Segoe UI",sans-serif;color:#2b342c;background:#f3f1e9;line-height:1.9}
  a{text-decoration:none;color:inherit}
  .wrap{max-width:900px;margin:0 auto;padding:0 28px}
  header{display:flex;justify-content:space-between;align-items:center;padding:28px 0}
  .logo{font-size:24px;letter-spacing:.28em}
  nav a{margin-left:26px;font-size:15px;color:#5a6b5c}
  nav a:hover{color:#2b342c}
  .hero{text-align:center;padding:90px 0 70px}
  .hero .seal{display:inline-block;width:54px;height:54px;line-height:54px;border:2px solid #3f6b4a;color:#3f6b4a;border-radius:8px;font-size:26px;margin-bottom:26px}
  h1{font-size:46px;letter-spacing:.16em;font-weight:600}
  .hero p{color:#5a6b5c;margin-top:20px;font-size:17px;letter-spacing:.06em}
  .list{padding:20px 0 70px}
  .list h2{text-align:center;color:#9aa79b;letter-spacing:.3em;font-size:14px;margin-bottom:34px;font-weight:400}
  .tea{display:flex;justify-content:space-between;align-items:baseline;padding:18px 0;border-bottom:1px solid #e0ddd0}
  .tea .n{font-size:19px;letter-spacing:.1em}
  .tea .d{flex:1;padding:0 20px;color:#8a958b;font-size:14px}
  .tea .p{color:#3f6b4a;font-weight:600}
  .band{background:#2b342c;color:#dfe6df;text-align:center;padding:70px 28px}
  .band p{font-size:22px;letter-spacing:.16em;max-width:600px;margin:0 auto}
  footer{padding:42px 0;text-align:center;color:#8a958b;font-size:14px;letter-spacing:.08em}
  @media(max-width:620px){h1{font-size:34px}.tea .d{display:none}}
</style>
</head>
<body>
<header><div class="wrap" style="display:flex;justify-content:space-between;align-items:center;width:100%">
  <div class="logo">青山茶舍</div>
  <nav><a href="#cha">茶单</a><a href="#guanyu">关于</a><a href="#dizhi">地址</a></nav>
</div></header>

<section class="wrap hero">
  <div class="seal">茶</div>
  <h1>慢一点，更有味道</h1>
  <p>一处安静的茶空间，挑选当季的好茶，陪你度过一个下午。</p>
</section>

<section class="wrap list" id="cha">
  <h2>本季茶单</h2>
  <div class="tea"><span class="n">明前龙井</span><span class="d">清香回甘，春日采摘。</span><span class="p">¥48</span></div>
  <div class="tea"><span class="n">高山乌龙</span><span class="d">花果香气，醇厚耐泡。</span><span class="p">¥56</span></div>
  <div class="tea"><span class="n">老白茶</span><span class="d">温润甘甜，越陈越香。</span><span class="p">¥62</span></div>
  <div class="tea"><span class="n">茉莉银针</span><span class="d">茉莉与嫩芽，香气清新。</span><span class="p">¥52</span></div>
</section>

<section class="band" id="guanyu">
  <p>「一杯茶的时间，<br>足够把心放慢。」</p>
</section>

<footer id="dizhi">&copy; 2026 青山茶舍 &middot; 城南老街 18 号 &middot; 每日 10:00 – 21:00</footer>
</body>
</html>
